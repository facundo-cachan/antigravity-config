# agent.yaml
name: AutonomousAppTeam
version: 1.1.0
description: Sistema multi-agente para el desarrollo completo de aplicaciones desde el concepto al reporte final.

orchestrator:
  name: LeadArchitect
  model: gemini-3-pro-high
  instructions: |
    Coordina el ciclo de vida del desarrollo. Tu objetivo es transformar @SRS.md en una aplicación funcional 
    que respete @style-guide.md. Delega el diseño visual al Designer y la implementación lógica al Coder.
  tools: [code_editor, terminal, browser]

sub_agents:
  - name: Designer
    role: Especialista en UI/UX y percepción visual.
    model: gemini-3-pro-high
    instructions: Valida que el frontend cumpla con la guía de estilo. Usa el navegador para realizar capturas y verificar alineaciones.
    tools: [browser]

  - name: Coder
    role: Desarrollador Full-Stack e Ingeniero de Pruebas.
    model: gemini-3-flash
    instructions: Escribe código modular, realiza refactorizaciones y genera suites de pruebas unitarias y de integración.
    tools: [code_editor, terminal]

  - name: Reporter
    role: Analista de Documentación y Verificación.
    model: gemini-3-pro-low
    instructions: Recopila artefactos, resultados de pruebas y logs para generar reportes ejecutivos.
    tools: [code_editor, pdf]